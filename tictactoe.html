<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0f0;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      color: #a78bfa;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      transition: color 0.2s;
    }

    #status.x  { color: #60a5fa; }
    #status.o  { color: #f472b6; }
    #status.win { color: #34d399; font-weight: bold; }
    #status.draw { color: #fbbf24; font-weight: bold; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #1e1b3a;
      border: 2px solid #2d2a5e;
      border-radius: 12px;
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #2a2550;
      border-color: #6d28d9;
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #60a5fa; }
    .cell.o { color: #f472b6; }

    .cell.win-cell {
      background: #1a3a2a;
      border-color: #34d399;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .cell:active:not(.taken) { transform: scale(0.94); }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.8rem;
      font-size: 0.95rem;
    }

    .score-box {
      text-align: center;
      background: #1e1b3a;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
      border: 1px solid #2d2a5e;
    }

    .score-box .label { font-size: 0.75rem; letter-spacing: 0.1em; opacity: 0.7; }
    .score-box .val   { font-size: 1.4rem; font-weight: bold; }
    .score-box.x .val { color: #60a5fa; }
    .score-box.o .val { color: #f472b6; }
    .score-box.d .val { color: #fbbf24; }

    #restart {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      background: #4c1d95;
      color: #e9d5ff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>
  <div id="status" class="x">X's turn</div>
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="score">
    <div class="score-box x"><div class="label">X WINS</div><div class="val" id="sx">0</div></div>
    <div class="score-box d"><div class="label">DRAWS</div><div class="val" id="sd">0</div></div>
    <div class="score-box o"><div class="label">O WINS</div><div class="val" id="so">0</div></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board = Array(9).fill(null);
    let current = 'X';
    let over = false;
    const score = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function render() {
      cells.forEach((c, i) => {
        c.textContent = board[i] || '';
        c.className = 'cell' + (board[i] ? ' taken ' + board[i].toLowerCase() : '');
      });
      if (!over) {
        status.className = 'status ' + current.toLowerCase();
        status.textContent = `${current}'s turn`;
      }
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function handleClick(i) {
      if (over || board[i]) return;
      board[i] = current;
      render();

      const winLine = checkWin();
      if (winLine) {
        over = true;
        winLine.forEach(idx => cells[idx].classList.add('win-cell'));
        score[current]++;
        document.getElementById(current === 'X' ? 'sx' : 'so').textContent = score[current];
        status.className = 'win';
        status.textContent = `${current} wins!`;
      } else if (board.every(Boolean)) {
        over = true;
        score.D++;
        document.getElementById('sd').textContent = score.D;
        status.className = 'draw';
        status.textContent = "It's a draw!";
      } else {
        current = current === 'X' ? 'O' : 'X';
        render();
      }
    }

    cells.forEach(c => c.addEventListener('click', () => handleClick(+c.dataset.i)));

    document.getElementById('restart').addEventListener('click', () => {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      render();
    });

    render();
  </script>
</body>
</html>
